<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>لعبة المافيا</title>
  </head>
  <body>

    <div id="auth-screen" class="center-content fade-in">
      <div class="card">
        <h2 style="color: var(--primary-gold); margin-bottom: 10px;">بوابة الدخول</h2>
        <p style="color: var(--text-dim); margin-bottom: 20px; font-size: 0.95rem;">أدخل رقم الجوال الذي قمت بالشراء به</p>
        
        <input type="tel" id="phone-input" class="input-field" placeholder="05XXXXXXXX" dir="ltr" />
        <button id="login-btn" class="btn btn-primary">تحقق وابدأ اللعب</button>
        
        <p id="error-msg" style="color: var(--bright-red); margin-top: 15px; display: none; font-size: 1rem; font-weight: 700;"></p>
      </div>
    </div>

    <div id="root" style="display: none;"></div>

    <script>
      const API_URL = "https://script.google.com/macros/s/AKfycbxrgwlNy4ZvuLdoEqo-aNgEqC7BD0N5eKzzRTtWR7M8BV8TDH5OOtqzaXewTz1QttYo/exec";
      const GAME_ID = "mafia"; 
      let checkInterval;

      const authScreen = document.getElementById('auth-screen');
      const gameRoot = document.getElementById('root');
      const loginBtn = document.getElementById('login-btn');
      const phoneInput = document.getElementById('phone-input');
      const errorMsg = document.getElementById('error-msg');

      loginBtn.addEventListener('click', async () => {
        const phone = phoneInput.value.trim();
        if (!phone) {
          errorMsg.textContent = "الرجاء إدخال رقم الجوال";
          errorMsg.style.display = "block";
          return;
        }

        loginBtn.textContent = "جاري التحقق...";
        loginBtn.style.opacity = "0.7";
        loginBtn.disabled = true;
        errorMsg.style.display = "none";

        try {
          const res = await fetch(`${API_URL}?action=login&phone=${phone}&game=${GAME_ID}`);
          const data = await res.json();

          if (data.status === "success") {
            // نجاح الدخول - حفظ الجلسة وإظهار اللعبة
            localStorage.setItem('session_mafia', data.session);
            localStorage.setItem('phone_mafia', phone);
            
            authScreen.remove(); // إزالة شاشة القفل بالكامل
            gameRoot.style.display = "block"; // إظهار اللعبة
            
            startHeartbeat(phone, data.session);
          } else {
            // فشل الدخول
            errorMsg.textContent = data.message;
            errorMsg.style.display = "block";
          }
        } catch (e) {
          errorMsg.textContent = "حدث خطأ في الاتصال، تأكد من الإنترنت";
          errorMsg.style.display = "block";
        }

        loginBtn.textContent = "تحقق وابدأ اللعب";
        loginBtn.style.opacity = "1";
        loginBtn.disabled = false;
      });

      // نظام حماية الجهاز الواحد (يتحقق كل 60 ثانية)
      function startHeartbeat(phone, session) {
        checkInterval = setInterval(async () => {
          try {
            const res = await fetch(`${API_URL}?action=check&phone=${phone}&game=${GAME_ID}&session=${session}`);
            const data = await res.json();
            
            if (data.status === "kick") {
              alert(data.message); // إظهار رسالة الطرد
              clearInterval(checkInterval);
              localStorage.removeItem('session_mafia');
              window.location.reload(); // إعادة تحميل الصفحة ليظهر القفل مجدداً
            }
          } catch (e) {
            console.log("Heartbeat error");
          }
        }, 60000);
      }
    </script>

    <script type="module" src="/src/entry.jsx"></script>
  </body>
</html>
